<style>
    .table-striped thead th:nth-child(2),
    .table-striped thead td:nth-child(2) {
        width: 15%; /* 项目号 */
    }
    .table-striped thead th:nth-child(3),
    .table-striped thead td:nth-child(3) {
        width: 10%; /* 类型 */
    }
    .table-striped thead th:nth-child(4),
    .table-striped thead td:nth-child(4) {
        width: 10%; /* 功率 */
    }
    .table-striped thead th:nth-child(5),
    .table-striped thead td:nth-child(5) {
        width: 15%; /* 客户 */
    }
    .table-striped thead th:nth-child(6),
    .table-striped thead td:nth-child(6) {
        width: 30%; /* 描述 */
    }
    .table-striped thead th:nth-child(7),
    .table-striped thead td:nth-child(7) {
        width: 10%; /* 操作 */
    }
    .form-label {
        color: var(--bs-black) !important;
    }
    .modal-dialog {
        margin: 0;
    }
</style>
<div class="module" id="project">
    <button id="addProjectBtn" class="btn btn-primary translate-item">
        <i class="fa fa-plus me-1"></i>新增项目
    </button>

    <!-- 项目列表 -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-light text-center">
                    <tr>
                        <th class="d-none" data-original-text="ID">ID</th>
                        <th>项目名</th>
                        <th>项目类型</th>
                        <th>功率</th>
                        <th>客户</th>
                        <th>描述</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="projectTableBody">
                    <!-- 用户数据将通过JavaScript加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑用户模态框 -->
<div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true" style="top: 50%;left: 50%;transform: translate(-50%,-50%)">
    <div class="modal-dialog modal-lg" style="height: 100%;">
        <div class="modal-content" style="height: 100%;">
            <div class="modal-header">
                <h5 class="modal-title" id="projectModalTitle" class="translate-item" data-original-text="添加项目">添加项目</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">
                    <div class="row g-3 mb-3">
                        <div class="col-md-12">
                            <label for="projectname" class="form-label translate-item" data-original-text="项目名">项目名</label>
                            <input type="text" class="form-control" id="projectname" required>
                        </div>
                        <div class="col-md-6">
                            <label for="typeSelect" class="form-label translate-item" data-original-text="项目类型">项目类型</label>
                            <select class="form-select" id="typeSelect" required>
                                <option value="">请选择项目类型</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="powerSelect" class="form-label translate-item" data-original-text="功率">功率</label>
                            <select class="form-select" id="powerSelect" required>
                                <option value="">请选择项目功率</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="customerSelect" class="form-label translate-item" data-original-text="客户">客户</label>
                            <select class="form-select" id="customerSelect" required>
                                <option value="">请选项目客户</option>
                            </select>
                        </div>
                        <div class="col-md-12">
                            <label for="prodescirption" class="form-label translate-item" data-original-text="描述">描述</label>
                            <textarea class="form-control translate-item" id="proDescirption" rows="1" placeholder="请输入项目补充描述"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="saveUserBtn" class="translate-item" data-original-text="保存">保存</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" class="translate-item" data-original-text="取消">取消</button>
            </div>
        </div>
    </div>
</div>
