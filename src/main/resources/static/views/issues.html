<style>
    /* 事务列表表格列宽设置 */
    .table-striped thead th:nth-child(2),
    .table-striped thead td:nth-child(2) {
        width: 7%; /* 项目号 */
    }
    .table-striped thead th:nth-child(3),
    .table-striped thead td:nth-child(3) {
        width: 25%; /* 标题（较宽） */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .table-striped thead th:nth-child(4),
    .table-striped thead td:nth-child(4) {
        width: 6%; /* 优先级 */
    }
    .table-striped thead th:nth-child(5),
    .table-striped thead td:nth-child(5) {
        width: 7.5%; /* 执行人 */
    }
    .table-striped thead th:nth-child(6),
    .table-striped thead td:nth-child(6) {
        width: 7.5%; /* 负责人 */
    }
    .table-striped thead th:nth-child(7),
    .table-striped thead td:nth-child(7) {
        width: 6%; /* 状态 */
    }
    .table-striped thead th:nth-child(8),
    .table-striped thead td:nth-child(8) {
        width: 11%; /* 创建时间 */
    }
    .table-striped thead th:nth-child(9),
    .table-striped thead td:nth-child(9) {
        width: 11%; /* 预计完成时间 */
    }
    .table-striped thead th:nth-child(10),
    .table-striped thead td:nth-child(10) {
        width: 11%; /* 最后更新时间 */
    }
    .table-striped thead th:nth-child(11),
    .table-striped thead td:nth-child(11) {
        width: 12%; /* 操作 */
    }
    .table thead th {
        color: #f8f9fa; /* 设置为你想要的颜色，这里是 Bootstrap 的蓝色示例 */
        font-weight: bold;
    }

    /* 查看详情模态框样式 */
    #viewTransactionModal .list-group-item {
        margin-bottom: 10px;
        border-radius: 6px;
    }

    #viewTransactionModal .list-group-item h6 {
        color: #0d6efd;
    }

    #viewTransactionModal {
        max-height: 80vh !important;
        overflow-y: auto;
    }

    #viewTransactionModal .modal-body {
        max-height: 70vh;
        overflow-y: auto;
    }

    #viewTransactionModal p {
        font-size: 14px; /* 字体大小 */
        color: #333; /* 字体颜色（深灰色，比默认更清晰） */
        line-height: 1.6; /* 行高（提升可读性） */
        margin-bottom: 0; /* 清除默认底部边距（避免间距过大） */
        padding: 2px 0; /* 上下内边距（优化点击区域和视觉） */
    }

    .form-label {
        color: var(--bs-black) !important;
    }
    .modal-dialog {
        margin: 0;
    }
</style>


<!-- 页面容器 -->
<div class="module" id="issues">
    <button id="createTransactionBtn" class="btn btn-primary translate-item">
        <i class="fa fa-plus me-1"></i>新建事务
    </button>

    <!-- 筛选区域 -->
    <div class="card mb-4">
        <div class="card-body">
            <form id="transactionFilterForm" class="row g-3">
                <div class="col-md-2">
                    <input type="text" class="form-control" id="globalSearchInput" placeholder="输入关键词搜索...">
                </div>
                <!-- 项目筛选 -->
                <div class="col-md-2">
                    <div class="input-group">
                        <!-- 搜索输入框 -->
                        <input type="text" class="form-control" id="projectSearchInput" placeholder="搜索项目...">
                        <!-- 下拉选项列表 -->
                        <label for="projectFilter"></label><select class="form-select" id="projectFilter">
                            <option value="">全部项目</option>
                            <!-- JavaScript 将动态填充这里的选项 -->
                        </select>
                    </div>
                </div>

                <!-- 状态筛选 -->
                <div class="col-md-1">
                    <select class="form-select" id="statusFilter" name="status">
                        <option class="translate-item" value="">全部状态</option>
                        <option class="translate-item" value="ce80a01d-0955-4295-8bae-a535cb7ed8ce">开启</option>
                        <option class="translate-item" value="613b595e-66f0-4a5f-b0a1-99fa2919778f">进行中</option>
                        <option class="translate-item" value="561dfe60-26e3-404b-87ed-9981a4c8a404">待验证</option>
                        <option class="translate-item" value="19dfdcbd-098c-46ae-89e2-7ef78cd14fbe">待提交</option>
                        <option class="translate-item" value="0d652c28-8172-48d9-9bbf-586fe526b620">已关闭</option>
                    </select>
                </div>

                <!-- 执行人筛选 -->
                <div class="col-md-2">
                    <div class="input-group">
                        <!-- 搜索输入框 -->
                        <input type="text" class="form-control" id="executorSearchInput" placeholder="搜索执行人...">
                        <!-- 下拉选项列表 -->
                        <select class="form-select" id="executorFilter">
                            <option value="">全部执行人</option>
                            <!-- JavaScript 将动态填充这里的选项 -->
                        </select>
                    </div>
                </div>

                <!-- 日期范围筛选 -->
                <div class="col-md-3">
                    <div class="input-group">
                        <input type="date" class="form-control" id="startDateFilter" name="startDate">
                        <span class="input-group-text">至</span>
                        <input type="date" class="form-control" id="endDateFilter" name="endDate">
                    </div>
                </div>

                <div class="col-md-auto">
                    <div class="input-group">
                        <button id="resetBtn" type="reset" class="btn btn-primary w-100">
                            <i class="fa fa-refresh me-1"></i>重置
                        </button>
                    </div>
                </div>
                <!-- 查询按钮 -->
<!--                <div class="col-md-2 d-flex align-items-end">-->
<!--                    <button type="submit" class="btn btn-primary w-100">-->
<!--                        <i class="fa fa-search me-1"></i>查询-->
<!--                    </button>-->
<!--                </div>-->
            </form>
        </div>
    </div>

    <!-- 事务列表表格 -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover" style="table-layout: fixed">
                    <thead class="table-light text-center">
                    <tr>
                        <th class="d-none">事务编号</th>
                        <th class="sortable translate-item" data-sort-field="projectName">项目号 <span class="sort-icon"></span></th>
                        <th class="translate-item">事务描述</th>
                        <th class="sortable translate-item" data-sort-field="priority">优先级 <span class="sort-icon"></span></th>
                        <th class="sortable translate-item" data-sort-field="actionOwnerName">执行人 <span class="sort-icon"></span></th>
                        <th class="sortable translate-item" data-sort-field="issueOwnerName">负责人 <span class="sort-icon"></span></th>
                        <th class="translate-item">状态</th>
                        <th class="sortable translate-item" data-sort-field="startTime">创建时间 <span class="sort-icon"></span></th>
                        <th class="translate-item">截止时间</th>
                        <th class="translate-item">最后更新时间</th>
                        <th class="translate-item">操作</th>
                    </tr>
                    </thead>
                    <tbody id="transactionsTableBody">
                    <!-- 表格内容通过JS动态加载 -->
                    <tr>
                        <td colspan="9" class="text-center translate-item">加载中...</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- 分页控件 -->
            <ul id="pagination" class="pagination justify-content-center">
                <!-- 分页内容通过JS动态加载 -->
                <li class="page-item disabled">
                    <a class="page-link" href="#" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item disabled">
                    <a class="page-link" href="#" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- 新建/编辑事务模态框 -->
<div class="modal fade" id="transactionModal" tabindex="-1" aria-hidden="true" style="top: 50%;left: 50%;transform: translate(-50%,-50%)">
    <div class="modal-dialog modal-lg" style="height: 100%;">
        <div class="modal-content" style="height: 100%;">
            <div class="modal-header">
                <h5 class="modal-title translate-item" id="transactionModalTitle">新建事务</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="transactionForm">
                <input type="hidden" id="transactionId" name="id"> <!-- 用于编辑时传递ID -->
                <div class="modal-body">
                    <div class="row g-3">
                        <!-- 项目选择 -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold translate-item">项目<span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="modalProjectSearchInput" placeholder="搜索项目...">
                                <select class="form-select translate-item" id="projectSelect" required>
                                    <option value="">请选择项目</option>
                                    <!-- JavaScript 将动态填充这里的选项 -->
                                </select>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold translate-item">优先级<span class="text-danger">*</span></label>
                            <div class="input-group translate-item">
                                <select class="form-select" id="prioritySelect" name="priority" required>
                                    <option class="translate-item" value="a494d282-677e-4132-99d2-1df43596fe53">高</option>
                                    <option class="translate-item" value="f58c089f-2fb2-4111-9617-097ab92052a8">中</option>
                                    <option class="translate-item" value="04ea249c-dba4-4a23-b9e9-7a4849fb5b98">低</option>
                                    <!-- JavaScript 将动态填充这里的选项 -->
                                </select>
                            </div>
                        </div>

                        <!-- 事务描述 -->
                        <div class="col-md-12">
                            <label for="descriptionInput" class="form-label fw-bold translate-item">事务详情</label>
                            <textarea class="form-control translate-item" id="descriptionInput" name="description" rows="4"
                                      placeholder="请输入事务详细描述"></textarea>
                        </div>

                        <!-- 执行人选择 -->
                        <div class="col-md-6">
                            <label class="form-label fw-bold translate-item">执行人<span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="modalExecutorSearchInput" placeholder="搜索执行人...">
                                <select class="form-select translate-item" id="executorSelect" required>
                                    <option value="">请选择执行人</option>
                                    <!-- JavaScript 将动态填充这里的选项 -->
                                </select>
                            </div>
                        </div>

                        <!-- 负责人 -->
                        <div class="col-md-6">
                            <label for="负责人Input" class="form-label fw-bold translate-item">负责人 <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="负责人Input" placeholder="搜索负责人...">
                                <select class="form-select translate-item" id="leaderSelect" required>
                                    <option value="">请选择负责人</option>
                                    <!-- JavaScript 将动态填充这里的选项 -->
                                </select>
                            </div>
                        </div>

                        <!-- 预计完成时间 -->
                        <div class="col-md-6">
                            <label for="expectedCompletionTimeInput" class="form-label fw-bold translate-item">截止时间 <span
                                    class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" id="expectedCompletionTimeInput"
                                   name="expectedCompletionTime" required>
                        </div>

                        <!-- 状态选择 -->
                        <div class="col-md-6">
                            <label for="statusSelect" class="form-label fw-bold translate-item">状态</label>
                            <select class="form-select translate-item" id="statusSelect" name="status">
                                <option value="ce80a01d-0955-4295-8bae-a535cb7ed8ce">开启</option>
                                <option value="613b595e-66f0-4a5f-b0a1-99fa2919778f">进行中</option>
                                <option value="561dfe60-26e3-404b-87ed-9981a4c8a404">待验证</option>
                                <option value="19dfdcbd-098c-46ae-89e2-7ef78cd14fbe">待提交</option>
                                <option value="0d652c28-8172-48d9-9bbf-586fe526b620">已关闭</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary translate-item">保存</button>
                    <button type="button" class="btn btn-secondary translate-item" data-bs-dismiss="modal">取消</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 查看事务详情专用模态框 -->
<div class="modal fade" id="viewTransactionModal" tabindex="-1" aria-hidden="true" style="top: 50%;left: 50%;transform: translate(-50%,-50%)">
    <div class="modal-dialog modal-lg" style="height: 100%;">
        <div class="modal-content" style="height: 100%;">
            <div class="modal-header">
                <h5 class="modal-title form-label translate-item" id="viewTransactionModalTitle">事务详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3 mb-4">
                    <input type="hidden" id="thisactionId" name="id"> <!-- 用于编辑时传递ID -->
                    <!-- 基本信息区域 -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold translate-item">项目</label>
                        <p id="viewProjectName"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold translate-item">报告人</label>
<!--                        <p id="viewReporter"></p>-->
                        <div class="d-flex align-items-center">
                            <p id="viewReporter" class="w-50"></p>
                            <button class="btn btn-primary" id="chatWithReporter" data-user-id="">
                                <i class="fa fa-wechat"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold translate-item">执行人</label>
<!--                        <p id="viewExecutor"></p>-->
                        <div class="d-flex align-items-center">
                            <p id="viewExecutor" class="w-50"></p>
                            <button class="btn btn-primary" id="chatWithExecutor" data-user-id="">
                                <i class="fa fa-wechat"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold translate-item">负责人</label>
<!--                        <p id="viewLeader"></p>-->
                        <div class="d-flex align-items-center">
                            <p id="viewLeader" class="w-50"></p>
                            <button class="btn btn-primary" id="chatWithLeader" data-user-id="">
                                <i class="fa fa-wechat"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold translate-item">状态</label>
                        <p id="viewStatus"></p>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold translate-item">截止时间</label>
                        <p id="viewExpectedCompletionTime"></p>
                    </div>
                    <div class="col-md-12" style="height: 20vh !important;">
                        <label class="form-label fw-bold translate-item">事务详情</label>
                        <p id="viewDescription" class="border p-3 rounded" style="height: 70%;"></p>
                    </div>
                </div>

                <!-- 更新记录区域 -->
                <div class="mt-4">
                    <h5 class="form-label fw-bold translate-item">更新记录</h5>
                    <div id="updateListContainer" class="mt-2">
                        <!-- 更新记录将通过JS动态加载 -->
                        <p class="text-muted translate-item">暂无更新记录</p>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary translate-item" id="openAddUpdateBtn">添加事务更新</button>
                <button type="button" class="btn btn-secondary translate-item" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
<!-- 添加事务更新模态框 -->
<div class="modal fade" id="addUpdateModal" tabindex="-1" aria-hidden="true" style="max-width: 500px;top: 50%;left: 50%;transform: translate(-50%,-50%)">
    <div class="modal-dialog modal-md" style="height: 100%;">
        <div class="modal-content" style="height: 100%;">
            <div class="modal-header">
                <h5 class="modal-title translate-item">添加事务更新</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addUpdateForm">
                    <!-- 存储当前事务ID（隐藏字段） -->
                    <input type="hidden" id="currentIssueId">

                    <div class="mb-3">
                        <label class="form-label fw-bold translate-item" for="updateContent">更新内容 <span class="text-danger">*</span></label>
                        <textarea class="form-control translate-item" id="updateContent" rows="3" placeholder="请输入事务更新的详细内容" required></textarea>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold translate-item" for="updateStatus">事务状态</label>
                            <select class="form-select translate-item" id="updateStatus" required>
                                <option value="ce80a01d-0955-4295-8bae-a535cb7ed8ce">开启</option>
                                <option value="613b595e-66f0-4a5f-b0a1-99fa2919778f">进行中</option>
                                <option value="561dfe60-26e3-404b-87ed-9981a4c8a404">待验证</option>
                                <option value="19dfdcbd-098c-46ae-89e2-7ef78cd14fbe">待提交</option>
                                <option value="0d652c28-8172-48d9-9bbf-586fe526b620">已关闭</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold translate-item" for="updateExecutor">执行人</label>
                            <!-- 下拉选项列表 -->
                            <select class="form-select" id="updateExecutor">
                                <option value=""></option>
                                <!-- JavaScript 将动态填充这里的选项 -->
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold" for="updateLeader">负责人</label>
                            <!-- 下拉选项列表 -->
                            <select class="form-select" id="updateLeader">
                                <option value=""></option>
                                <!-- JavaScript 将动态填充这里的选项 -->
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary translate-item" id="saveUpdateBtn">保存更新</button>
                <button type="button" class="btn btn-secondary translate-item" data-bs-dismiss="modal">取消</button>
            </div>
        </div>
    </div>
</div>
