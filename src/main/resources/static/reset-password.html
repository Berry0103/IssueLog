<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码重置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            color: #333;
        }
        /* 星空容器样式 */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            background: #0a0a1a; /* 深太空背景 */
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            pointer-events: none;
            animation: starMove linear forwards; /* 取消infinite，改为单次动画后通过JS重置 */
        }

        /* 动画保持移动逻辑，但不自动循环 */
        @keyframes starMove {
            from {
                transform: translate(0, 0);
            }
            to {
                transform: translate(var(--move-x), var(--move-y));
            }
        }

        /* 星星闪烁动画 */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .reset-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .reset-title {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            color: #4a90e2;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
        }
        .btn-reset {
            width: 100%;
            padding: 0.8rem;
            background: #4a90e2;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.3s;
        }
        .btn-reset:hover {
            background: #3a7bc8;
        }
        .btn-reset:disabled {
            background: #999;
            cursor: not-allowed;
        }
        .message {
            height: 24px;
            line-height: 24px;
            margin: 8px 0;
            font-size: 0.875rem;
            text-align: center;
        }
        .error {
            color: #ff4d4f;
        }
        .success {
            color: #52c41a;
        }
    </style>
</head>
<body>
<!-- 星空背景容器 -->
<div class="stars-container" id="stars"></div>

<!-- 登录容器 -->
<div class="login-container">
    <div class="reset-card">
        <h2 class="reset-title">重置密码</h2>
        <div class="form-group">
            <label for="newPassword">新密码</label>
            <input type="password" id="newPassword" class="form-control" placeholder="密码长度至少8位，包含字母和数字" required>
        </div>
        <div class="form-group">
            <label for="confirmPassword">确认新密码</label>
            <input type="password" id="confirmPassword" class="form-control" placeholder="请再次输入新密码" required>
        </div>
        <div class="message" id="message"></div>
        <button class="btn-reset" id="resetBtn">确认重置</button>
    </div>
</div>

<script>
    // 1. 获取URL中的token参数
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const messageEl = document.getElementById('message');
    const resetBtn = document.getElementById('resetBtn');
    const newPasswordEl = document.getElementById('newPassword');
    const confirmPasswordEl = document.getElementById('confirmPassword');

    // 2. 验证token是否有效
    if (!token) {
        messageEl.textContent = '无效的重置链接，请重新申请';
        messageEl.className = 'message error';
        resetBtn.disabled = true;
    }

    // 3. 重置密码按钮点击事件（核心：POST请求提交）
    resetBtn.addEventListener('click', async () => {
        const newPassword = newPasswordEl.value.trim();
        const confirmPassword = confirmPasswordEl.value.trim();

        // 清空提示
        messageEl.textContent = '';
        messageEl.className = 'message';

        // 表单验证
        if (newPassword !== confirmPassword) {
            messageEl.textContent = '两次输入的密码不一致';
            messageEl.className = 'message error';
            return;
        }
        if (newPassword.length < 8 || !/\d/.test(newPassword) || !/[a-zA-Z]/.test(newPassword)) {
            alert('密码长度至少8位，且必须包含字母和数字');
            return;
        }

        try {
            // 4. 发送POST请求到后端重置密码接口
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',  // 明确使用POST请求
                headers: {
                    'Content-Type': 'application/json',  // JSON格式
                },
                body: JSON.stringify({
                    token: token,          // 从URL获取的token
                    newPassword: newPassword  // 用户输入的新密码
                })
            });

            const result = await response.json();

            if (result.success) {
                messageEl.textContent = result.message;
                messageEl.className = 'message success';
                resetBtn.disabled = true;
                // 3秒后跳转到登录页
                setTimeout(() => {
                    window.location.href = '/login.html'; // 替换为你的登录页地址
                }, 3000);
            } else {
                messageEl.textContent = result.message;
                messageEl.className = 'message error';
            }
        } catch (error) {
            console.error('重置失败:', error);
            messageEl.textContent = '网络错误，请稍后重试';
            messageEl.className = 'message error';
        }
    });

    // 星空动画逻辑
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.querySelector('.stars-container');
        const starCount = 550; // 星星数量可适当增加

        // 随机数工具函数
        const random = (min, max) => Math.random() * (max - min) + min;

        // 生成星星并设置初始状态
        for (let i = 0; i < starCount; i++) {
            const star = createStar();
            container.appendChild(star);
            // 启动第一次动画
            startStarAnimation(star);
        }

        // 创建星星元素
        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');

            // 初始化星星基础属性（大小、初始位置、透明度）
            const size = random(1, 3);
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.left = `${random(0, 100)}%`; // 随机初始X位置（屏幕内）
            star.style.top = `${random(0, 100)}%`;  // 随机初始Y位置（屏幕内）
            star.style.opacity = random(0.5, 1);    // 随机透明度（更真实）

            return star;
        }

        // 启动星星动画（核心：动画结束后自动生成新路径）
        function startStarAnimation(star) {
            // 随机生成移动参数（每次动画都不同）
            const duration = random(60, 180); // 移动周期延长至60-180秒（更自然）
            const moveX = random(-window.innerWidth * 1.5, window.innerWidth * 1.5); // 移动距离超出屏幕1.5倍
            const moveY = random(-window.innerHeight * 1.5, window.innerHeight * 1.5);

            // 设置动画变量
            star.style.animationDuration = `${duration}s`;
            star.style.setProperty('--move-x', `${moveX}px`);
            star.style.setProperty('--move-y', `${moveY}px`);

            // 清除旧的动画结束事件（避免重复触发）
            star.removeEventListener('animationend', onAnimationEnd);
            // 监听动画结束，触发下一次移动
            star.addEventListener('animationend', onAnimationEnd);

            // 强制重绘动画（解决连续动画不触发的问题）
            star.style.animation = 'none';
            star.offsetHeight; // 触发重绘
            star.style.animation = '';
        }

        // 动画结束后回调：重置位置并启动新动画
        function onAnimationEnd(e) {
            const star = e.target;

            // 计算星星当前位置（动画结束后的位置）
            const computedStyle = window.getComputedStyle(star);
            const matrix = new DOMMatrix(computedStyle.transform);
            const currentX = matrix.e; // 当前X坐标
            const currentY = matrix.f; // 当前Y坐标

            // 将星星“瞬移”到屏幕外随机位置（模拟新星星进入视野）
            // 避免在屏幕内突然跳转，增强连续性
            const newX = random(-window.innerWidth * 0.5, window.innerWidth * 1.5); // 左右超出屏幕范围
            const newY = random(-window.innerHeight * 0.5, window.innerHeight * 1.5); // 上下超出屏幕范围

            // 重置星星位置（无动画）
            star.style.transform = `translate(${newX}px, ${newY}px)`;
            star.style.left = '0'; // 清除百分比定位，改用transform控制位置
            star.style.top = '0';

            // 延迟100ms启动新动画（避免视觉闪烁）
            setTimeout(() => {
                startStarAnimation(star);
            }, 1000);
        }
    });
</script>
</body>
</html>
