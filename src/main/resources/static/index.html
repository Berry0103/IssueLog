    <script>
        // 初始化密码修改模态框
        const changePasswordModal = new bootstrap.Modal(document.getElementById('changePasswordModal'));

        // 绑定修改密码按钮事件
        document.getElementById('changePwdBtn').addEventListener('click', function(e) {
            e.preventDefault();
            // 重置表单
            document.getElementById('changePasswordForm').reset();
            // 显示模态框
            changePasswordModal.show();
        });

        // 绑定确认修改按钮事件
        document.getElementById('submitPasswordChange').addEventListener('click', function() {
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;

            // 简单验证
            if (!newPwd || !confirmPwd) {
                alert('请填写所有字段');
                return;
            }

            if (newPwd !== confirmPwd) {
                alert('两次输入的新密码不一致');
                return;
            }

            if (newPwd.length < 8 || !/\d/.test(newPwd) || !/[a-zA-Z]/.test(newPwd)) {
                alert('密码长度至少8位，且必须包含字母和数字');
                return;
            }

            // 发送密码修改请求
            fetch('/api/user/update-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    userIndex: window.currentUser,
                    password: newPwd
                })
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('修改密码失败');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data) {
                        alert('密码修改成功，请重新登录');
                        changePasswordModal.hide();
                        // 这里可以添加退出登录逻辑
                        window.location.href = '/login.html';
                    } else {
                        alert('修改密码失败');
                    }
                })
                .catch(error => {
                    console.error('修改密码出错:', error);
                    alert('修改密码时发生错误，请稍后重试');
                });
        });

        // 全局配置
        const config = {
            translateClass: 'translate-item',
            ignoreClass: 'translataddUpdateModale-item-ignore',
            translateApiUrl: '/api/translate/batch',
            userInfoUrl: '/api/user/current',
            updateLangUrl: '/api/user/update-lang',
            cacheKey: 'translate-cache'
        };

        // 全局变量
        let currentUserLang = 'zh'; // 默认中文
        let translateCache = {};

        // 1. 本地存储工具（仅缓存翻译结果，语言从后端获取）
        function isLocalStorageAvailable() {
            try {
                const testKey = 'test-' + Date.now();
                localStorage.setItem(testKey, testKey);
                localStorage.removeItem(testKey);
                return true;
            } catch (e) {
                console.warn('LocalStorage不可用：', e);
                return false;
            }
        }
        const storageOK = isLocalStorageAvailable();

        // 初始化翻译缓存
        if (storageOK) {
            try {
                const cacheFromStorage = localStorage.getItem(config.cacheKey);
                translateCache = cacheFromStorage ? JSON.parse(cacheFromStorage) : {};
                if (typeof translateCache !== 'object' || translateCache === null) translateCache = {};
            } catch (e) {
                translateCache = {};
            }
        }

        // 保存翻译缓存
        function saveCache() {
            if (!storageOK) return;
            try {
                localStorage.setItem(config.cacheKey, JSON.stringify(translateCache));
            } catch (e) {
                console.error('缓存保存失败：', e);
            }
        }

        // 2. 获取当前用户信息（核心：读取用户语言配置）
        async function getCurrentUserInfo() {
            const response = await fetch(config.userInfoUrl)
                .then(response => {
                    if (!response.ok) {
                        window.location.href = '/login.html?timeout=true';
                        throw new Error('获取用户信息失败');
                    }
                    return response.json();
                })
                .then(user => {
                    // 1. 显示用户名
                    document.getElementById('fullnameDisplay').textContent = user.fullName;
                    // 2. 处理角色等级
                    const maxLevel = user.rolerlevel; // 取最高等级
                    window.currentUser = user.userIndex;
                    window.currentUserLevel = user.rolerlevel;
                    currentUserLang = (user.language && ['zh', 'en'].includes(user.language)) ? user.language : 'zh';
                    console.log(currentUserLang)

                    // 3. 筛选侧边栏菜单，并获取可见的第一个模块
                    const firstVisibleModule = filterSidebarMenu(maxLevel);

                    // 4. 加载第一个可见模块（替代默认的dashboard）
                    if (firstVisibleModule) {
                        app.loadModule(firstVisibleModule);
                    }
                })
                .catch(error => {
                    console.error('获取用户信息出错：', error);
                    document.getElementById('fullnameDisplay').textContent = '未知用户';
                });
        }

        // 3. 更新用户语言配置（切换语言时调用）
        async function updateUserLang(targetLang) {
            if (!window.currentUser) return false;
            const user = {
                userIndex: window.currentUser,
                language: targetLang
            }
            await fetch(config.updateLangUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(user)
            })
                .then(response => {
                    if (!response.ok) throw new Error('更新用户语言失败');
                    return response.json();
                })
                .then(() => {
                    console.log('用户语言更新成功：', targetLang);
                    return true;
                })
                .catch(error => {
                    console.error('更新用户语言报错：', e);
                    return false;
                });

        }

        // 4. 收集需翻译的文本
        function collectTexts() {
            const texts = [];
            // 使用更灵活的选择器，确保包含所有动态加载的内容
            document.querySelectorAll(`.${config.translateClass}:not(.${config.ignoreClass})`).forEach(el => {
                const text = el.textContent.trim();
                if (text && !texts.includes(text)) {
                    texts.push(text);
                    // 确保原始文本被正确记录
                    if (!el.dataset.originalText) {
                        el.dataset.originalText = text;
                    }
                }
            });
            return texts;
        }

        // 5. 调用翻译接口
        async function translate(texts, toLang) {
            const uncached = texts.filter(t => !translateCache[`${t}_${toLang}`]);
            if (uncached.length === 0) {
                const res = {};
                texts.forEach(t => res[t] = translateCache[`${t}_${toLang}`]);
                saveCache();
                return res;
            }

            try {
                const resp = await fetch(config.translateApiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texts: uncached, to: toLang })
                });
                if (!resp.ok) throw new Error(`翻译接口失败：${resp.status}`);
                const data = await resp.json();

                Object.keys(data).forEach(t => translateCache[`${t}_${toLang}`] = data[t]);
                saveCache();

                const res = {};
                texts.forEach(t => res[t] = translateCache[`${t}_${toLang}`] || t);
                return res;
            } catch (e) {
                console.error('翻译接口报错：', e);
                const res = {};
                texts.forEach(t => res[t] = translateCache[`${t}_${toLang}`] || t);
                return res;
            }
        }

        // 6. 渲染页面语言
        async function renderLang(targetLang) {
            // 更新html lang属性
            document.documentElement.lang = targetLang === 'zh' ? 'zh-CN' : 'en-US';

            await new Promise(resolve => setTimeout(resolve, 0));
            const texts = collectTexts();
            if (texts.length === 0) return;

            const transMap = await translate(texts, targetLang);

            document.querySelectorAll(`.${config.translateClass}:not(.${config.ignoreClass})`).forEach(el => {
                if (!el.dataset.originalText) {
                    el.dataset.originalText = el.textContent.trim();
                }
                const original = el.dataset.originalText;
                if (el.textContent.trim() !== transMap[original]) {
                    el.textContent = transMap[original];
                }
                // const original = el.dataset.originalText || el.textContent.trim();
                // el.textContent = transMap[original] || original;
            });

            currentUserLang = targetLang;
        }

        // 7. 语言切换逻辑（同步更新后端+前端渲染）
        async function switchLang(targetLang) {
            // 先更新后端用户语言
            const updateSuccess = await updateUserLang(targetLang);
            // 无论后端是否成功，都渲染前端语言（保证用户体验）
            await renderLang(targetLang);
        }

        //     fetch('/api/user/current')

        //             window.currentUserLevel = user.rolerlevel;
        //             window.currentUserLang = (user.language && ['zh', 'en'].includes(user.language)) ? user.language : 'zh';
        //

        //

        //         })
        //         .catch(error => {
        //             console.error('获取用户信息出错：', error);
        //             document.getElementById('fullnameDisplay').textContent = '未知用户';
        //         });
        // };

        // 8. 页面初始化（核心：先读用户语言，再渲染）
        async function initPage() {
            await getCurrentUserInfo();
            await renderLang(currentUserLang);
        }

        // 根据用户最高等级筛选菜单，并返回第一个可见模块
        function filterSidebarMenu(maxLevel) {
            const menuItems = document.querySelectorAll('.sidebar-menu .nav-link');
            let firstVisibleModule = null;

            menuItems.forEach((item, index) => {
                const requiredLevel = parseInt(item.getAttribute('data-level'));

                if (maxLevel >= requiredLevel) {
                    item.style.display = 'block';
                    // 记录第一个可见的模块
                    if (!firstVisibleModule) {
                        firstVisibleModule = item.getAttribute('data-module');
                    }
                } else {
                    item.style.display = 'none';
                }
            });

            return firstVisibleModule;
        }

        window.addEventListener('load', initPage);
    </script>
